<style>
  :host {
    --gray-900: oklch(19.37% 0.006 300.98);
    --gray-700: oklch(36.98% 0.014 302.71);
    --gray-400: oklch(70.9% 0.015 304.04);


    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
      "Segoe UI Symbol";
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .button {
    background-color: var(--gray-700);
    color: white;
    border: none;
    padding: 0.rem 1rem;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 0.25rem;
    transition: background-color 0.3s ease;
  }

  h1 {
    font-size: 3.125rem;
    color: var(--gray-900);
    font-weight: 500;
    line-height: 100%;
    letter-spacing: -0.125rem;
    margin: 0;
    font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
      "Segoe UI Symbol";
  }


  main {
    width: 100%;
    min-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem;
    box-sizing: inherit;
    position: relative;
  }


</style>

<main class="main">
  <div class="calculator">
    <div class="display">
      {{ display }}
    </div>
    <div class="buttons">
      <button class="clear" (click)="clear()">C</button>
      <button class="backspace" (click)="backspace()">←</button>
      <button class="operator" (click)="appendOperatorToDisplay('/')">/</button>
      <button class="operator" (click)="appendOperatorToDisplay('*')">×</button>
      
      <button (click)="appendToDisplay('7')">7</button>
      <button (click)="appendToDisplay('8')">8</button>
      <button (click)="appendToDisplay('9')">9</button>
      <button class="operator" (click)="appendOperatorToDisplay('-')">-</button>
      
      <button (click)="appendToDisplay('4')">4</button>
      <button (click)="appendToDisplay('5')">5</button>
      <button (click)="appendToDisplay('6')">6</button>
      <button class="operator" (click)="appendOperatorToDisplay('+')">+</button>
      
      <button (click)="appendToDisplay('1')">1</button>
      <button (click)="appendToDisplay('2')">2</button>
      <button (click)="appendToDisplay('3')">3</button>
      <button class="operator" (click)="appendToDisplay('.')">.</button>
      <button class="equals" (click)="calculate()">=</button>
      <button (click)="appendToDisplay('0')">0</button>
      <button class="operator" (click)="calculateSqrt()">√</button>
      

      <button class="history-toggle" (click)="toggleHistory()">
        {{ showHistory ? 'Geçmişi Gizle' : 'Geçmişi Göster' }}
      </button>
    </div>

    <div class="history" *ngIf="showHistory">
      <h3>Geçmiş İşlemler</h3>
      <div class="history-item" *ngFor="let item of history" (click)="useHistoryItem(item)">
        <div class="history-expression">{{ item.expression }}</div>
        <div class="history-result">= {{ item.result }}</div>
        <div class="history-time">{{ formatTimestamp(item.timestamp) }}</div>
      </div>
    </div>
  </div>
</main>

<router-outlet />
